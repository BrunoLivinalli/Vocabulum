<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Termo Simples</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Vocabulum</h1>

<!-- TABULEIRO DO JOGO (onde ficam as letras) -->
<div id="board"></div>

<!-- TECLADO VIRTUAL -->
<div id="keyboard">

    <!-- Linha 1 -->
    <div class="keyboard-row-first">
        <div class="key">Q</div>
        <div class="key">W</div>
        <div class="key">E</div>
        <div class="key">R</div>
        <div class="key">T</div>
        <div class="key">Y</div>
        <div class="key">U</div>
        <div class="key">I</div>
        <div class="key">O</div>
        <div class="key">P</div>
    </div>

    <!-- Linha 2 -->
    <div class="keyboard-row-second">
        <div class="key">A</div>
        <div class="key">S</div>
        <div class="key">D</div>
        <div class="key">F</div>
        <div class="key">G</div>
        <div class="key">H</div>
        <div class="key">J</div>
        <div class="key">K</div>
        <div class="key">L</div>
    </div>

    <!-- Linha 3 -->
    <div class="keyboard-row-third">
        <div class="key enter-key">ENTER</div>
        <div class="key">Z</div>
        <div class="key">X</div>
        <div class="key">C</div>
        <div class="key">V</div>
        <div class="key">B</div>
        <div class="key">N</div>
        <div class="key">M</div>
        <div class="key backspace-key">⌫</div>
    </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
